<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' file: data:;">
  <title>ZmRef</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="titlebar">
      <span id="titlebar-title">ZmRef</span>
      <div id="window-controls">
        <button id="btn-minimize" class="window-control" title="Minimize">
          <svg width="12" height="12" viewBox="0 0 12 12"><rect y="5" width="12" height="2" fill="currentColor"/></svg>
        </button>
        <button id="btn-maximize" class="window-control" title="Maximize">
          <svg width="12" height="12" viewBox="0 0 12 12"><rect x="1" y="1" width="10" height="10" stroke="currentColor" stroke-width="2" fill="none"/></svg>
        </button>
        <button id="btn-close" class="window-control close" title="Close">
          <svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 1L11 11M1 11L11 1" stroke="currentColor" stroke-width="2"/></svg>
        </button>
      </div>
    </div>
    
    <div id="viewport-container">
      <div id="viewport">
        <div id="canvas">
        </div>
      </div>
    </div>
    
    <div id="welcome-overlay" class="active">
      <div class="welcome-content">
        <h1>ZmRef</h1>
        <p>Minimalist Reference Tool</p>
        <button id="btn-open-project">Open Project Folder</button>
        <p class="hint">or drag & drop images to create new project</p>
        <div id="drop-status"></div>
      </div>
    </div>
    
    <div id="status-bar">
      <span id="status-zoom">100%</span>
      <span id="status-project"></span>
    </div>
  </div>
  
  <script src="renderer.js"></script>
</body>
</html>
