<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' file: data:;">
  <title>ZmRef</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="drag-region"></div>
    
    <div id="viewport-container">
      <div id="viewport">
        <div id="canvas">
        </div>
      </div>
    </div>
    
    <div id="welcome-overlay" class="active">
      <div class="welcome-content">
        <div id="recent-projects">
          <div id="recent-projects-list"></div>
        </div>
        <div class="welcome-actions">
          <button id="btn-new-project">New Project</button>
          <button id="btn-open-project">Open Project</button>
        </div>
      </div>
    </div>
    
    <div id="status-bar">
      <span id="status-zoom">100%</span>
      <span id="status-project"></span>
    </div>
  </div>
  
  <script src="renderer.js"></script>
</body>
</html>
